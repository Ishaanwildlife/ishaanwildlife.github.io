<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaan Wildlife</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* DARK CINEMATIC OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.8),
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.9)
    );
    z-index:-1;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:white;
    z-index:10;
}

nav h1{
    font-size:24px;
    letter-spacing:2px;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li{
    cursor:pointer;
    transition:0.3s;
}

nav ul li:hover{
    color:#ffcc00;
}

/* HERO SECTION */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    animation:fadeIn 2s ease-in;
}

.hero h2{
    font-size:60px;
    letter-spacing:4px;
    text-shadow:0 0 20px rgba(255,255,255,0.5);
}

.hero p{
    margin-top:20px;
    font-size:18px;
    opacity:0.8;
}

.hero button{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    background:#ffcc00;
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover{
    transform:scale(1.1);
}

/* GALLERY */
.gallery{
    padding:100px 50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    transition:0.4s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* ABOUT */
.about{
    padding:100px 50px;
    color:white;
    text-align:center;
}

.about h2{
    font-size:40px;
    margin-bottom:20px;
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(30px);}
    to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="wildlife.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- NAVBAR -->
<nav>
    <h1>ISHAAN</h1>
    <ul>
        <li>Home</li>
        <li>Gallery</li>
        <li>About</li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>WILDLIFE PHOTOGRAPHY</h2>
    <p>Capturing nature through my lens</p>
    <button onclick="scrollToGallery()">Explore</button>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
    <img src="DSC_0016.JPG">
    <img src="DSC_0038.JPG">
    <img src="DSC_1458.JPG">
    <img src="DSC_5775.JPG">
    <img src="ISH_0300.JPG">
    <img src="ISH_0830.JPG">
</section>

<!-- ABOUT -->
<section class="about">
    <h2>About Me</h2>
    <p>
        I am Ishaan, a passionate wildlife photographer capturing rare and powerful moments from nature.
        My goal is to bring people closer to wildlife through my lens.
    </p>
</section>

<script>
function scrollToGallery(){
    document.getElementById("gallery").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
