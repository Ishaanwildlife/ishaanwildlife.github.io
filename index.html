<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaan Wildlife</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* BACKGROUND IMAGE (YOU 🔥) */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('1000523306.jpg') center/cover no-repeat;
    filter: blur(3px) brightness(0.6);
    transform: scale(1.1);
    z-index:-2;
}

/* OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9));
    z-index:-1;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:25px 60px;
    color:white;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav a{
    color:white;
    text-decoration:none;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:80px;
    letter-spacing:5px;
    animation:fadeUp 1.5s ease;
}

.hero p{
    margin-top:10px;
    opacity:0.8;
}

.btn{
    margin-top:20px;
    padding:12px 30px;
    background:gold;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

/* ABOUT */
.section{
    padding:120px 50px;
    background:black;
    color:white;
    text-align:center;
}

.section h2{
    font-size:40px;
    margin-bottom:20px;
}

/* ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<!-- YOUR PHOTO BACKGROUND -->
<div class="bg"></div>
<div class="overlay"></div>

<nav>
    <h1>ISHAAN</h1>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">About</a></li>
    </ul>
</nav>

<section class="hero">
    <h1>WILDLIFE</h1>
    <p>Capturing Nature Through My Lens</p>
    <button class="btn">Explore</button>
</section>

<section class="section">
    <h2>About Me</h2>
    <p>
        I am a passionate wildlife photographer capturing rare and breathtaking moments of nature.
        Every shot reflects patience, precision, and love for wildlife.
    </p>
</section>

</body>
</html>
