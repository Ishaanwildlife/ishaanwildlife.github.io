<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaan Wildlife</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* LIGHTER OVERLAY (IMPORTANT FIX) */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.4),   /* lighter */
        rgba(0,0,0,0.6)
    );
    z-index:-1;
}

/* NAVBAR */
nav{
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    color:white;
    z-index:10;
}

nav h1{
    font-size:28px;
    letter-spacing:2px;
}

nav ul{
    display:flex;
    list-style:none;
    gap:30px;
}

nav a{
    color:white;
    text-decoration:none;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:gold;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

/* CINEMATIC TEXT ANIMATION */
.hero h1{
    font-size:70px;
    letter-spacing:5px;
    animation:fadeUp 1.5s ease forwards;
}

.hero p{
    margin-top:10px;
    font-size:18px;
    opacity:0.8;
    animation:fadeUp 2s ease forwards;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:12px 30px;
    background:gold;
    color:black;
    border:none;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    animation:fadeUp 2.5s ease forwards;
}

.btn:hover{
    transform:scale(1.1);
}

/* ANIMATION */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(50px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* SCROLL SECTION */
.section{
    padding:100px 50px;
    background:black;
    color:white;
    text-align:center;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="wildlife.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- NAV -->
<nav>
    <h1>ISHAAN</h1>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">About</a></li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>WILDLIFE</h1>
    <p>Capturing Nature Through My Lens</p>
    <button class="btn">Explore</button>
</section>

<!-- EXTRA SECTION -->
<section class="section">
    <h2>About Me</h2>
    <p>
        I am a wildlife photographer capturing rare and beautiful moments of nature.
        My journey started with passion and is now turning into something powerful.
    </p>
</section>

</body>
</html>
