<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ishaan Wildlife</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

/* LOADER */
.loader{
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:30px;
    letter-spacing:5px;
    z-index:9999;
    animation:fadeOut 2s forwards;
    animation-delay:2s;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* VIDEO */
#bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    opacity:0;
    animation:videoFade 3s forwards;
    animation-delay:2s;
}

@keyframes videoFade{
    to{opacity:1;}
}

/* OVERLAY */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:-1;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    color:white;
    z-index:10;
}

nav ul{
    display:flex;
    gap:30px;
    list-style:none;
}

nav ul li{
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h2{
    font-size:70px;
    letter-spacing:6px;
    animation:slideUp 2s ease;
}

.hero p{
    margin-top:15px;
    opacity:0.8;
}

@keyframes slideUp{
    from{transform:translateY(50px); opacity:0;}
    to{transform:translateY(0); opacity:1;}
}

/* BUTTON */
.hero button{
    margin-top:30px;
    padding:12px 30px;
    background:#ffcc00;
    border:none;
    cursor:pointer;
    transition:0.3s;
}

.hero button:hover{
    transform:scale(1.1);
}

/* GALLERY */
.gallery{
    padding:100px 40px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    transition:0.5s;
}

.gallery img:hover{
    transform:scale(1.1);
}

/* ABOUT */
.about{
    padding:100px 40px;
    text-align:center;
    color:white;
}

.about p{
    max-width:700px;
    margin:auto;
}

</style>
</head>

<body>

<!-- 🔥 LOADER -->
<div class="loader">ISHAAN</div>

<!-- 🎥 VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
    <source src="wildlife.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- NAV -->
<nav>
    <h1>ISHAAN</h1>
    <ul>
        <li onclick="scrollToSection('gallery')">Gallery</li>
        <li onclick="scrollToSection('about')">About</li>
    </ul>
</nav>

<!-- HERO -->
<section class="hero">
    <h2>WILDLIFE</h2>
    <p>Capture. Explore. Inspire.</p>
    <button onclick="playSound(); scrollToSection('gallery')">Enter</button>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
    <img src="DSC_0016.JPG">
    <img src="DSC_0038.JPG">
    <img src="DSC_1458.JPG">
    <img src="DSC_5775.JPG">
</section>

<!-- ABOUT -->
<section class="about" id="about">
    <h2>About Me</h2>
    <p>I am Ishaan, capturing the wild through my lens.</p>
</section>

<!-- 🔊 SOUND -->
<audio id="clickSound">
    <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<!-- JS -->
<script>

function scrollToSection(id){
    document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* SOUND */
function playSound(){
    document.getElementById("clickSound").play();
}

/* AUTOPLAY FIX */
const video = document.getElementById("bg-video");
video.play().catch(() => {
    document.body.addEventListener("click", () => video.play());
});

</script>

</body>
</html>
