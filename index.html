<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ishaan Wildlife</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:white;
  font-family:'Poppins',sans-serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

/* VIDEO */
.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  animation: zoom 20s infinite alternate;
}

@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.1);}
}

/* OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(0,0,0,0.6), black);
}

/* TEXT */
.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
  top:45%;
  transform:translateY(-50%);
}

.hero h1{
  font-size:4.5rem;
  font-family:'Playfair Display',serif;
  letter-spacing:4px;
}

/* TYPING EFFECT */
.typing{
  border-right:2px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation:typing 3s steps(30,end) forwards, blink .7s infinite;
}

@keyframes typing{
  to{width:100%;}
}
@keyframes blink{
  50%{border-color:transparent;}
}

/* BUTTON */
.sound-btn{
  position:absolute;
  bottom:20px;
  right:20px;
  background:rgba(255,255,255,0.2);
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* SECTION */
.section-title{
  text-align:center;
  margin:80px 0 30px;
  font-size:2.2rem;
  color:#f5c542;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:20px;
}

.gallery img{
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:15px;
  transition:0.6s;
}

.gallery img:hover{
  transform:scale(1.1);
  box-shadow:0 0 50px rgba(255,255,255,0.3);
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
}

.lightbox.active{display:flex;}

/* SCROLL ANIMATION */
.hidden{
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

.show{
  opacity:1;
  transform:translateY(0);
}

/* ABOUT */
.about{
  max-width:800px;
  margin:auto;
  padding:60px 20px;
  text-align:center;
  line-height:1.8;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop playsinline id="video">
    <source src="wildlife.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1 class="typing">Ishaan Wildlife</h1>
    <p>Cinematic Nature Stories</p>
  </div>

  <button class="sound-btn" onclick="toggleSound()">🔊</button>
</section>

<!-- GALLERY -->
<h2 class="section-title hidden">My Work</h2>

<div class="gallery">
  <img src="DSCN1948.JPG">
  <img src="DSC_0016.JPG">
  <img src="DSC_0038.JPG">
  <img src="DSC_1458.JPG">
  <img src="DSC_5775.JPG">
  <img src="DSC_5939.JPG">
  <img src="DSC_6136.JPG">
  <img src="DSC_6292.JPG">
  <img src="ISH_0300.JPG">
  <img src="ISH_0830.JPG">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<!-- ABOUT -->
<section class="about hidden">
  <h2 class="section-title">About Me</h2>
  <p>
    I am Ishaan, a wildlife photographer capturing cinematic moments in nature.
    Every frame tells a story of life, survival, and beauty.
  </p>
</section>

<footer>
  © 2026 Ishaan Wildlife
</footer>

<script>
/* LIGHTBOX */
const imgs=document.querySelectorAll(".gallery img");
const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

imgs.forEach(img=>{
  img.onclick=()=>{
    lightbox.classList.add("active");
    lightboxImg.src=img.src;
  }
});

lightbox.onclick=()=>lightbox.classList.remove("active");

/* SOUND */
const vid=document.getElementById("video");
function toggleSound(){
  vid.muted=!vid.muted;
}

/* SCROLL ANIMATION */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el=>observer.observe(el));
</script>

</body>
</html>
